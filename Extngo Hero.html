<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Extngo · Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  html,body{margin:0;padding:0;background:#F6F3EE;min-height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;color:#1A1A1A;scroll-behavior:smooth}
  /* The hero is a fixed-height screen, the detail follows */
  .hero-screen{position:relative;width:100%;height:100vh;overflow:hidden}
  /* Smoother scroll feel */
  ::-webkit-scrollbar{width:10px}
  ::-webkit-scrollbar-thumb{background:rgba(26,26,26,.15);border-radius:10px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(26,26,26,.25)}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="hero-shared.jsx"></script>
<script type="text/babel" src="hero-scene.jsx"></script>
<script type="text/babel" src="hero-safe.jsx"></script>
<script type="text/babel" src="hero-detail.jsx"></script>
<script type="text/babel" src="product-pinned.jsx"></script>

<script type="text/babel" data-presets="react">
  const TWEAKS = /*EDITMODE-BEGIN*/{
    "showGiantWordmark": true
  }/*EDITMODE-END*/;

  function TweaksPanel({ show, onClose, state, set }) {
    if (!show) return null;
    return (
      <div className="tweaks">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
          <h4 style={{margin:0}}>Tweaks</h4>
          <button onClick={onClose} style={{background:'none',border:0,cursor:'pointer',color:'#6D6D6D',padding:4,fontSize:16,lineHeight:1}}>×</button>
        </div>
        <div className="row">
          <span>Giant wordmark</span>
          <button className={`switch ${state.showGiantWordmark?'on':''}`} onClick={() => set({showGiantWordmark:!state.showGiantWordmark})}/>
        </div>
        <div className="row">
          <span>Replay animation</span>
          <button className="action" onClick={() => set({__replay:true})}>↻ Replay</button>
        </div>
        <div className="row">
          <span>Scroll to details</span>
          <button className="action" onClick={() => document.getElementById('product-detail')?.scrollIntoView({behavior:'smooth'})}>↓ Detail</button>
        </div>
      </div>
    );
  }

  function App() {
    const [tweaks, setTweaks] = React.useState(TWEAKS);
    const [editMode, setEditMode] = React.useState(false);
    const [animKey, setAnimKey] = React.useState(0);

    React.useEffect(() => {
      const handler = (e) => {
        const d = e.data;
        if (!d || typeof d !== 'object') return;
        if (d.type === '__activate_edit_mode') setEditMode(true);
        else if (d.type === '__deactivate_edit_mode') setEditMode(false);
      };
      window.addEventListener('message', handler);
      window.parent.postMessage({type:'__edit_mode_available'}, '*');
      return () => window.removeEventListener('message', handler);
    }, []);

    const applyTweak = (patch) => {
      if (patch.__replay) { setAnimKey(k=>k+1); window.scrollTo({top:0, behavior:'smooth'}); return; }
      setTweaks(t => {
        const next = { ...t, ...patch };
        window.parent.postMessage({type:'__edit_mode_set_keys', edits: patch}, '*');
        return next;
      });
    };

    return (
      <>
        <main>
          <div className="hero-screen" data-screen-label="01 Hero">
            <HeroSafe animKey={animKey} showWordmark={tweaks.showGiantWordmark}/>
          </div>
          <div data-screen-label="02 Product Detail">
            <ProductDetail/>
          </div>
        </main>
        <PinnedProduct/>
        <TweaksPanel show={editMode} onClose={() => setEditMode(false)} state={tweaks} set={applyTweak}/>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
